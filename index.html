<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; connect-src * 'unsafe-inline' https://api.groq.com; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    
    <title>Nijyar AI - Ultimate Master</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body class="dark-mode"> 

    <div class="aurora-container">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>
    <div id="stars-container"></div>

    <div id="login-screen" class="auth-wrapper">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="ai-icon">
                    <img src="logo.png" alt="Nijyar AI Icon" style="width: 50px; height: 50px; border-radius: 12px; margin-bottom:10px;" onerror="this.src='https://via.placeholder.com/50?text=AI'">
                </div>
                <h2>ب خێر بێی بۆ نژیار AI</h2>
                <p style="font-size: 12px; opacity: 0.7;">سیستەمێ پێشکەفتی یێ AI</p>
            </div>
            <div class="auth-body">
                <div class="input-field">
                    <input type="email" id="emailInput" placeholder="ئیمەیڵ...">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-field" style="position: relative; display: flex; align-items: center;">
                    <i class="fas fa-lock" style="position: absolute; right: 15px; pointer-events: none;"></i>
                    <input type="password" id="passInput" placeholder="پەیڤا نهێنی..." style="width: 100%; padding: 12px 40px 12px 45px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; outline: none; text-align:right;">
                    <div id="togglePasswordWrapper" style="position: absolute; left: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; z-index: 10;">
                        <i class="fas fa-eye" id="eyeIcon" style="color: #10a37f; font-size: 16px;"></i>
                    </div>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="signInBtn" class="login-btn" style="flex: 1;"><i class="fas fa-sign-in-alt"></i> چوونە ژوور</button>
                    <button id="signUpBtn" class="guest-btn" style="flex: 1; margin-top: 0; background:rgba(16, 163, 127, 0.1); border:1px solid #10a37f;"><i class="fas fa-user-plus"></i> تۆمارکرن</button>
                </div>
                
                <button id="googleBtn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google"> بەردەوام بە ب Google
                </button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="privacy.html" style="color: #10a37f; font-size: 12px; text-decoration: none;">سیاسەتا پاراستنێ</a>
                </div>
                <div class="divider"><span>یان</span></div>
                <button id="guestBtn" class="guest-btn" style="width:100%;"><i class="fas fa-user-secret"></i> وەک مێڤان (Guest)</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        
        <header class="gpt-top-bar glass-panel-header">
            <div class="top-bar-right">
                <button class="icon-btn-top" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
                <div class="model-selector" id="modelSelectorBtn">
                    <span id="currentModelText">Nijyar AI <i class="fas fa-star" style="color: #d4af37; font-size: 10px;"></i></span> 
                    <i class="fas fa-chevron-down" style="font-size: 12px; opacity: 0.7;"></i>
                </div>
            </div>
            <div class="top-bar-left">
                <button class="icon-btn-top" id="profileBtn"><i class="far fa-user-circle"></i></button>
                <button class="icon-btn-top" id="newChatTopBtn"><i class="far fa-edit"></i></button>
            </div>
        </header>

        <div id="modelDropdown" class="model-dropdown glass-panel hidden">
            <div class="mode-item active" data-mode="pro" data-name="Nijyar AI"><i class="fas fa-robot"></i> پڕۆفیشناڵ</div>
            <div class="mode-item" data-mode="legal" data-name="پ. یاسایی"><i class="fas fa-gavel"></i> پسپۆڕێ یاسایی</div>
            <div class="mode-item" data-mode="translator" data-name="وەرگێڕ"><i class="fas fa-language"></i> وەرگێڕ (Translator)</div>
            <div class="mode-item" data-mode="teacher" data-name="مامۆستا"><i class="fas fa-graduation-cap"></i> مامۆستا</div>
            <div class="mode-item" data-mode="code" data-name="کۆد ماستەر"><i class="fas fa-code"></i> کۆد ماستەر</div>
            <div class="mode-item" data-mode="live_voice" data-name="وەرگێڕێ دەنگی"><i class="fas fa-headset"></i> وەرگێڕێ دەنگی</div>
            <div class="mode-item" data-mode="data" data-name="شیکارکەرێ داتا"><i class="fas fa-chart-pie"></i> شیکارکەرێ داتا</div>
            <div class="mode-item" data-mode="agent" data-name="بریکارێ سەربەخۆ"><i class="fas fa-user-tie"></i> بریکارێ سەربەخۆ</div>
            <div class="mode-item" data-mode="comidy" data-name="کۆمیدی"><i class="fas fa-laugh"></i> کۆمیدی بادینی</div>
        </div>

        <div id="drawerOverlay" class="drawer-overlay"></div>
        <aside id="sideDrawer" class="gpt-drawer glass-panel-drawer">
            <div class="drawer-header">
                <button class="new-chat-design" id="drawerNewChatBtn">
                    <i class="fas fa-plus"></i> چاتەکا نوو
                </button>
                <div class="search-box" style="margin-top:15px;">
                    <i class="fas fa-search"></i>
                    <input type="text" id="historySearch" placeholder="گەڕیان د چاتان دا...">
                </div>
            </div>
            
            <div class="drawer-body" style="flex:1; overflow-y:auto; padding: 0 15px;">
                <div style="font-size:12px; color:var(--primary); margin: 10px 0; font-weight:bold;">مێژوویا چاتان</div>
                <div id="historyList" class="history-list"></div>
            </div>
            
            <div class="drawer-footer">
                <button class="drawer-item export-btn" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> PDF دابەزینە</button>
                <button class="drawer-item export-word-btn" id="exportWordBtn"><i class="fas fa-file-word"></i> Word دابەزینە</button>
                <button class="drawer-item" id="themeToggleBtn" style="background: rgba(255,255,255,0.05); color:white;"><i class="fas fa-moon" id="themeIcon"></i> گۆڕینا ڕەنگی</button>
                <button class="drawer-item logout-design" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> دەرکەفتن</button>
            </div>
        </aside>

        <main class="gpt-chat-main">
            <div id="chatBox" class="chat-messages"></div>

            <div id="artifacts-overlay" class="artifacts-hidden">
                <div class="artifacts-header">
                    <span><i class="fas fa-laptop-code"></i> دەستکارییا ڕاستەوخۆ</span>
                    <button id="closeArtifactsBtn" class="close-art-btn"><i class="fas fa-times"></i></button>
                </div>
                <iframe id="preview-frame"></iframe>
                <div class="artifact-editor-box">
                    <input type="text" id="artifactPrompt" placeholder="بێژە بۆتی: ڕەنگێ وی سوور بکە...">
                    <button id="updateArtifactBtn">
                        <i class="fas fa-magic"></i> گۆڕین
                    </button>
                </div>
            </div>

            <div class="gpt-input-container">
                <div id="imagePreviewContainer" class="preview-container"></div>
                <div class="gpt-input-box glass-panel">
                    <button id="attachBtn" class="icon-btn" title="پەڕاو یان وێنە (PDF/CSV/IMG)">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <input type="file" id="imageInput" accept="image/*, application/pdf, text/csv, .csv" style="display:none;">
                    
                    <button id="cameraBtn" class="icon-btn" title="ڤەکرنا کامێرایێ"><i class="fas fa-camera"></i></button>
                    <button id="screenBtn" class="icon-btn" title="شەیرکرنا شاشێ"><i class="fas fa-desktop"></i></button>
                    <button id="micBtn" class="icon-btn" title="دەنگ"><i class="fas fa-microphone"></i></button>

                    <textarea id="userInput" placeholder="پەیاما خۆ بنڤێسە (/agent, /گەنگەشە, /وێنە...)" rows="1"></textarea>
                    
                    <button id="stopBtn" class="icon-btn stop-btn" style="display:none; color:#ff4757;"><i class="fas fa-stop-circle"></i></button>
                    <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="auth-card glass-panel" style="padding:30px;">
            <h3 style="color:white; margin-top:0;"><i class="fas fa-user-circle"></i> پڕۆفایل</h3>
            <p style="color:rgba(255,255,255,0.7); margin:20px 0; font-size:18px; font-weight:bold;"><span id="display-name">بەکارھێنەر</span></p>
            <button class="login-btn" id="closeProfileBtn" style="width:100%;">داخستن</button>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; 
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        };
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
